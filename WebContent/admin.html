<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — MediCore HMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --text-dark: #1a2332;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --white: #ffffff;
    --bg: #f8fbff;
    --error: #E24B4A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(circle at 15% 50%, rgba(29,158,117,0.07) 0%, transparent 45%),
      radial-gradient(circle at 85% 30%, rgba(15,110,86,0.05) 0%, transparent 45%);
    pointer-events: none;
  }

  .login-wrap {
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 900px;
    width: 100%;
    background: var(--white);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(0,0,0,0.08);
    position: relative;
    z-index: 1;
  }

  /* Left panel */
  .panel-left {
    background: #0a3d2d;
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }
  .panel-left::before {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 240px; height: 240px;
    border-radius: 50%;
    border: 40px solid rgba(29,158,117,0.15);
  }
  .panel-left::after {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 30px solid rgba(29,158,117,0.1);
  }
  .panel-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .panel-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: white;
  }
  .panel-logo-text span { color: #5DCAA5; }

  .panel-content {
    position: relative;
    z-index: 1;
  }
  .panel-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: white;
    line-height: 1.25;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .panel-content p {
    font-size: 15px;
    color: rgba(255,255,255,0.6);
    line-height: 1.65;
    font-weight: 300;
  }

  .panel-stats {
    display: flex;
    gap: 24px;
    position: relative;
    z-index: 1;
  }
  .stat-item { }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: white;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    margin-top: 4px;
    font-weight: 400;
  }

  /* Right panel */
  .panel-right {
    padding: 56px 48px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .form-header {
    margin-bottom: 36px;
  }
  .form-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--teal);
    background: var(--teal-light);
    border: 1px solid rgba(15,110,86,0.2);
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 16px;
  }
  .form-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .form-header p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 8px;
    letter-spacing: 0.1px;
  }
  .input-wrap {
    position: relative;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
  }
  .input-icon svg { width: 16px; height: 16px; display: block; }
  input[type="text"],
  input[type="password"] {
    width: 100%;
    height: 46px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0 16px 0 42px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    background: var(--bg);
    transition: all 0.2s;
    outline: none;
  }
  input:focus {
    border-color: var(--teal);
    background: white;
    box-shadow: 0 0 0 4px rgba(15,110,86,0.08);
  }
  input::placeholder { color: #adb5bd; }

  .btn-login {
    width: 100%;
    height: 48px;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 8px;
    letter-spacing: 0.2px;
  }
  .btn-login:hover {
    background: #085041;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(15,110,86,0.3);
  }
  .btn-login:active { transform: translateY(0); }

  .form-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .form-footer a {
    color: var(--teal);
    text-decoration: none;
    font-weight: 500;
  }

  @media (max-width: 680px) {
    .login-wrap { grid-template-columns: 1fr; }
    .panel-left { display: none; }
    .panel-right { padding: 48px 32px; }
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="panel-left">
    <div class="panel-logo">
      <div class="logo-mark">
        <svg width="20" height="20" fill="none" viewBox="0 0 20 20">
          <path d="M10 2v16M2 10h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="panel-logo-text">Medi<span>Core</span></div>
    </div>
    <div class="panel-content">
      <h2>Patient Data<br>Management<br>Portal</h2>
      <p>Securely access and manage complete patient records, history, and hospital data in real time.</p>
    </div>
    <div class="panel-stats">
      <div class="stat-item">
      
      </div>
      <div class="stat-item">
      
      </div>
    </div>
  </div>

  <div class="panel-right">
    <div class="form-header">
      <span class="form-tag">Admin Access</span>
      <h1>Welcome Back</h1>
      <p>Sign in to access the patient management dashboard</p>
    </div>

    <form action="Alogin.jsp" method="get">
      <div class="form-group">
        <label for="admin-id">Administrator ID</label>
        <div class="input-wrap">
          <div class="input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
            </svg>
          </div>
          <input type="text" id="admin-id" name="id" placeholder="Enter your admin ID" required>
        </div>
      </div>

      <div class="form-group">
        <label for="admin-pwd">Password</label>
        <div class="input-wrap">
          <div class="input-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="7" width="10" height="8" rx="1.5"/>
              <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
            </svg>
          </div>
          <input type="password" id="admin-pwd" name="pwd" placeholder="Enter your password" required>
        </div>
      </div>

      <button type="submit" class="btn-login">
  Sign In
  <svg width="16" height="16" fill="none" viewBox="0 0 16 16" stroke="white" stroke-width="2">
    <path d="M3 8h10M9 4l4 4-4 4"/>
  </svg>
</button>

<button type="button" class="btn-login" onclick="window.location.href='Register.jsp'">
  Register Patient
  <svg width="16" height="16" fill="none" viewBox="0 0 16 16" stroke="white" stroke-width="2">
    <path d="M3 8h10M9 4l4 4-4 4"/>
  </svg>
</button>
    </form>

    <div class="form-footer">
      <a href="index.html">&larr; Back to Home</a>
    </div>
  </div>
</div>
</body>
</html>
