<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Login — MediCore HMS</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --green: #0F766E;
    --green-light: #E6FFFB;
    --green-dark: #115E59;
    --text-dark: #1a2332;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --white: #ffffff;
    --bg: #f8fbff;
  }

  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
  }

  body{
    font-family:'DM Sans', sans-serif;
    background:var(--bg);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
  }

  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 15% 50%, rgba(15,118,110,0.08) 0%, transparent 45%),
      radial-gradient(circle at 85% 30%, rgba(17,94,89,0.06) 0%, transparent 45%);
    pointer-events:none;
  }

  .login-wrap{
    width:100%;
    max-width:900px;
    display:grid;
    grid-template-columns:1fr 1fr;
    background:white;
    border-radius:24px;
    overflow:hidden;
    border:1px solid var(--border);
    box-shadow:0 24px 60px rgba(0,0,0,0.08);
    position:relative;
    z-index:1;
  }

  /* LEFT PANEL */

  .panel-left{
    background:#0B3B36;
    padding:56px 48px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    position:relative;
    overflow:hidden;
  }

  .panel-left::before{
    content:'';
    position:absolute;
    bottom:-80px;
    right:-80px;
    width:240px;
    height:240px;
    border-radius:50%;
    border:40px solid rgba(255,255,255,0.08);
  }

  .panel-left::after{
    content:'';
    position:absolute;
    top:-40px;
    left:-40px;
    width:160px;
    height:160px;
    border-radius:50%;
    border:30px solid rgba(255,255,255,0.05);
  }

  .panel-logo{
    display:flex;
    align-items:center;
    gap:12px;
    position:relative;
    z-index:1;
  }

  .logo-mark{
    width:40px;
    height:40px;
    border-radius:10px;
    background:rgba(255,255,255,0.15);
    display:flex;
    justify-content:center;
    align-items:center;
    border:1px solid rgba(255,255,255,0.2);
  }

  .panel-logo-text{
    font-family:'Playfair Display', serif;
    font-size:24px;
    font-weight:600;
    color:white;
  }

  .panel-logo-text span{
    color:#5EEAD4;
  }

  .panel-content{
    position:relative;
    z-index:1;
  }

  .panel-content h2{
    font-family:'Playfair Display', serif;
    font-size:34px;
    color:white;
    line-height:1.3;
    margin-bottom:18px;
  }

  .panel-content p{
    color:rgba(255,255,255,0.7);
    line-height:1.7;
    font-size:15px;
    font-weight:300;
  }

  /* RIGHT PANEL */

  .panel-right{
    padding:56px 48px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .form-header{
    margin-bottom:36px;
  }

  .form-tag{
    display:inline-block;
    padding:5px 14px;
    border-radius:20px;
    background:var(--green-light);
    color:var(--green);
    border:1px solid rgba(15,118,110,0.2);
    font-size:11px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    margin-bottom:16px;
  }

  .form-header h1{
    font-family:'Playfair Display', serif;
    font-size:30px;
    margin-bottom:8px;
    color:var(--text-dark);
  }

  .form-header p{
    color:var(--text-muted);
    font-size:14px;
  }

  .form-group{
    margin-bottom:22px;
  }

  label{
    display:block;
    margin-bottom:8px;
    font-size:13px;
    font-weight:500;
    color:var(--text-dark);
  }

  .input-wrap{
    position:relative;
  }

  .input-icon{
    position:absolute;
    top:50%;
    left:14px;
    transform:translateY(-50%);
    color:var(--text-muted);
  }

  .input-icon svg{
    width:16px;
    height:16px;
    display:block;
  }

  input{
    width:100%;
    height:48px;
    border:1.5px solid var(--border);
    border-radius:10px;
    padding:0 16px 0 42px;
    background:var(--bg);
    font-size:15px;
    transition:0.2s;
    outline:none;
  }

  input:focus{
    border-color:var(--green);
    background:white;
    box-shadow:0 0 0 4px rgba(15,118,110,0.08);
  }

  .btn-login{
    width:100%;
    height:48px;
    border:none;
    border-radius:10px;
    background:var(--green);
    color:white;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    transition:0.2s;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:10px;
  }

  .btn-login:hover{
    background:var(--green-dark);
    transform:translateY(-1px);
    box-shadow:0 10px 20px rgba(15,118,110,0.25);
  }

  .form-footer{
    text-align:center;
    margin-top:22px;
    font-size:13px;
  }

  .form-footer a{
    color:var(--green);
    text-decoration:none;
    font-weight:500;
  }

  @media(max-width:680px){

    .login-wrap{
      grid-template-columns:1fr;
    }

    .panel-left{
      display:none;
    }

    .panel-right{
      padding:40px 28px;
    }
  }
</style>
</head>

<body>

<div class="login-wrap">

  <!-- LEFT PANEL -->

  <div class="panel-left">

    <div class="panel-logo">

      <div class="logo-mark">
        <svg width="20" height="20" fill="none" viewBox="0 0 20 20">
          <path d="M10 2v16M2 10h16"
                stroke="white"
                stroke-width="2.5"
                stroke-linecap="round"/>
        </svg>
      </div>

      <div class="panel-logo-text">
        Medi<span>Core</span>
      </div>

    </div>

    <div class="panel-content">

      <h2>
        Doctor<br>
        Management<br>
        Portal
      </h2>

      <p>
        Securely manage appointments, patient reports,
        prescriptions, and medical records through
        the MediCore doctor dashboard.
      </p>

    </div>

  </div>

  <!-- RIGHT PANEL -->

  <div class="panel-right">

    <div class="form-header">

      <span class="form-tag">
        Doctor Access
      </span>

      <h1>Welcome Doctor</h1>

      <p>
        Sign in to continue to your doctor dashboard
      </p>

    </div>

    <form action="Dlogin.jsp" method="get">

      <div class="form-group">

        <label for="email">
          Doctor email
        </label>

        <div class="input-wrap">

          <div class="input-icon">
            <svg viewBox="0 0 16 16"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="1.5">
              <circle cx="8" cy="5" r="3"/>
              <path d="M2 14c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
            </svg>
          </div>

          <input type="text"
                 id="id"
                 name="id"
                 placeholder="Enter your doctor email"
                 >

        </div>

      </div>

      <div class="form-group">

        <label for="pwd">
          Password
        </label>

        <div class="input-wrap">

          <div class="input-icon">
            <svg viewBox="0 0 16 16"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="1.5">
              <rect x="3"
                    y="7"
                    width="10"
                    height="8"
                    rx="1.5"/>
              <path d="M5 7V5a3 3 0 0 1 6 0v2"/>
            </svg>
          </div>

          <input type="password"
                 id="pwd"
                 name="pwd"
                 placeholder="Enter your password"
                 >

        </div>

      </div>

      <button type="submit" class="btn-login">
  Sign In
  <svg width="16"
       height="16"
       fill="none"
       viewBox="0 0 16 16"
       stroke="white"
       stroke-width="2">
    <path d="M3 8h10M9 4l4 4-4 4"/>
  </svg>

</button>

<button type="button"
        class="btn-login"
        onclick="window.location.href='DoctorRegister.jsp'">

  Register Doctor
  <svg width="16"
       height="16"
       fill="none"
       viewBox="0 0 16 16"
       stroke="white"
       stroke-width="2">
    <path d="M3 8h10M9 4l4 4-4 4"/>
  </svg>

</button>


    </form>

    <div class="form-footer">

      <a href="index.html">
        &larr; Back to Home
      </a>

    </div>

  </div>

</div>

</body>
</html>
