<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Patient — MediCore HMS</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-mid: #1D9E75;
    --text-dark: #1a2332;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --white: #ffffff;
    --bg: #f8fbff;
    --sidebar-w: 260px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
  }
  .sidebar {    
    width: var(--sidebar-w);
    background: #0a3d2d;
    min-height: 100vh;
    position: fixed;
    left: 0; top: 0;
    display: flex;
    flex-direction: column;
    z-index: 50;
  }   
  .sidebar-logo {
    padding: 28px 24px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .sidebar-logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 19px;
    font-weight: 600;
    color: white;
  }
  .sidebar-logo-text span { color: #5DCAA5; }
  .sidebar-nav {
    flex: 1;
    padding: 20px 12px;
  }
  .nav-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding: 8px 12px;
    margin-bottom: 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    transition: all 0.2s;
    margin-bottom: 2px;
  }
  .nav-item:hover, .nav-item.active {
    background: rgba(255,255,255,0.1);
    color: white;
  }
  .nav-item.active { background: rgba(93,202,165,0.15); color: #5DCAA5; }
  .nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .sidebar-bottom {
    padding: 16px 12px 24px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .btn-logout {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    transition: all 0.2s;
    width: 100%;
  }
  .btn-logout:hover { background: rgba(226,75,74,0.15); color: #F09595; }
  .btn-logout svg { width: 18px; height: 18px; }

 
  .main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 40px 48px;
    max-width: 900px;
  }
  .page-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 36px;
  }
  .header-icon {
    width: 48px; height: 48px;
    background: var(--teal-light);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(15,110,86,0.15);
  }
  .header-icon svg { width: 22px; height: 22px; }
  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text-dark);
    letter-spacing: -0.4px;
  }
  .page-sub { font-size: 14px; color: var(--text-muted); margin-top: 2px; font-weight: 300; }

  .form-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
  }
  .form-section {
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
  }
  .form-section:last-child { border-bottom: none; }
  .section-heading {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--teal);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }
  .section-heading svg { width: 14px; height: 14px; }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .form-grid.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dark);
    margin-bottom: 7px;
  }
  label span { color: #E24B4A; margin-left: 2px; }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #94a3b8;
  }
  .input-icon svg { width: 15px; height: 15px; display: block; }
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    height: 44px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0 14px 0 38px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    background: var(--bg);
    transition: all 0.2s;
    outline: none;
    appearance: none;
  }
  textarea {
    height: 88px;
    padding: 12px 14px 12px 38px;
    resize: none;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--teal);
    background: white;
    box-shadow: 0 0 0 4px rgba(15,110,86,0.08);
  }
  input::placeholder, textarea::placeholder { color: #b0bec5; }
  .radio-group {
    display: flex;
    gap: 10px;
    margin-top: 2px;
  }
  .radio-option {
    flex: 1;
    position: relative;
  }
  .radio-option input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .radio-label {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    height: 44px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-muted);
    background: var(--bg);
    transition: all 0.18s;
    font-weight: 400;
  }
  .radio-option input:checked + .radio-label {
    border-color: var(--teal);
    background: var(--teal-light);
    color: var(--teal);
    font-weight: 500;
  }
  .radio-label:hover { border-color: var(--teal); }

  .form-actions {
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    background: #fafcfe;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {   
    height: 44px;
    padding: 0 24px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    background: white;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-muted);
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    transition: all 0.2s;
  }
  .btn-cancel:hover { background: var(--bg); border-color: #cbd5e1; color: var(--text-dark); }
  .btn-submit {
    height: 44px;
    padding: 0 28px;
    background: var(--teal);
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: white;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    letter-spacing: 0.1px;
  }
  .btn-submit:hover {
    background: #085041;
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(15,110,86,0.25);
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg width="18" height="18" fill="none" viewBox="0 0 20 20">
        <path d="M10 2v16M2 10h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="sidebar-logo-text">Medi<span>Core</span></div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Patient Management</div>
    <a href="PatientHome.jsp" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      Dashboard
    </a>
    <a href="addpat.html" class="nav-item active">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 11h-6M20 8v6"/>
      </svg>
      Add Patient
    </a>
    <a href="Show.jsp" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
      </svg>
      All Patients
    </a>
    <a href="delpat.html" class="nav-item">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      </svg>
      Delete Patient
    </a>
  </nav>
  <div class="sidebar-bottom">
    <a href="index.html" class="btn-logout">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </a>
  </div>
</aside>

<main class="main">
  <div class="page-header">
    <div class="header-icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="#0F6E56" stroke-width="1.8">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 11h-6M20 8v6"/>
      </svg>
    </div>
    <div>
      <div class="page-title">Register New Patient</div>
      <div class="page-sub">Fill in the patient details below to add them to the system</div>
    </div>
  </div>

  <div class="form-card">
    <form action="AddPatient.jsp" method="get">

      <div class="form-section">
        <div class="section-heading">
          <svg fill="none" viewBox="0 0 14 14" stroke="currentColor" stroke-width="2">
            <circle cx="7" cy="4" r="3"/><path d="M1 13c0-3.3 2.7-6 6-6s6 2.7 6 6"/>
          </svg>
          Personal Information
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Patient ID <span>*</span></label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg fill="none" viewBox="0 0 15 15" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="3" width="11" height="10" rx="1.5"/><path d="M5 7h5M5 9.5h3"/>
                </svg>
              </div>
              <input type="number" name="id" placeholder="e.g. 10001" required>
            </div>
          </div>
          <div class="form-group">
            <label>Full Name <span>*</span></label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg fill="none" viewBox="0 0 15 15" stroke="currentColor" stroke-width="1.5">
                  <circle cx="7.5" cy="5" r="3"/><path d="M1 14c0-3.6 2.9-6.5 6.5-6.5S14 10.4 14 14"/>
                </svg>
              </div>
              <input type="text" name="name" placeholder="First and last name" required>
            </div>
          </div>
          <div class="form-group">
            <label>Age <span>*</span></label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg fill="none" viewBox="0 0 15 15" stroke="currentColor" stroke-width="1.5">
                  <circle cx="7.5" cy="7.5" r="6"/><path d="M7.5 4v4l2.5 1.5"/>
                </svg>
              </div>
              <input type="number" name="age" placeholder="Years" min="0" max="150" required>
            </div>
          </div>
          <div class="form-group">
            <label>Gender <span>*</span></label>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="gender" value="Male" required>
                <span class="radio-label">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="10" cy="14" r="5"/><path d="M19 5l-5.4 5.4M19 5h-4M19 5v4"/></svg>
                  Male
                </span>
              </label>
              <label class="radio-option">
                <input type="radio" name="gender" value="Female">
                <span class="radio-label">
                  <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="9" r="5"/><path d="M12 14v6M9 17h6"/></svg>
                  Female
                </span>
              </label>
              <label class="radio-option">
                <input type="radio" name="gender" value="Other">
                <span class="radio-label">Other</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="section-heading">
          <svg fill="none" viewBox="0 0 14 14" stroke="currentColor" stroke-width="2">
            <path d="M9 2a1 1 0 0 1 1 1v1H4V3a1 1 0 0 1 1-1h4zM2 6v6a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V6H2zm3 2h4M5 10h2"/>
          </svg>
          Contact Details
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Phone Number <span>*</span></label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg fill="none" viewBox="0 0 15 15" stroke="currentColor" stroke-width="1.5">
                  <path d="M5.5 1.5h4a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-10a1 1 0 0 1 1-1z"/><circle cx="7.5" cy="11.5" r=".5" fill="currentColor"/>
                </svg>
              </div>
              <input type="number" name="phone" placeholder="10-digit number" required>
            </div>
          </div>
          <div class="form-group full">
            <label>Address <span>*</span></label>
            <div class="input-wrap">
              <div class="input-icon" style="top:14px;transform:none;">
                <svg fill="none" viewBox="0 0 15 15" stroke="currentColor" stroke-width="1.5">
                  <path d="M7.5 1a5 5 0 0 1 5 5c0 3.5-5 9-5 9S2.5 9.5 2.5 6a5 5 0 0 1 5-5z"/><circle cx="7.5" cy="6" r="1.5"/>
                </svg>
              </div>
              <textarea name="address" placeholder="Full address including city and PIN code" required></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a href="PatientHome.jsp" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-submit">
          <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/>
          </svg>
          Register Patient
        </button>
      </div>

    </form>
  </div>
</main>
</body>
</html>
